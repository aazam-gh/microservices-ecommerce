apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-api
  namespace: ecommerce
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: ecommerce-api
          image: ghcr.io/example/ecommerce-api:dev
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
