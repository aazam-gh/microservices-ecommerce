# ---- Keycloak Token Introspection (auth_request target) ----
# Nginx sends every protected request here first.
# The user-service validates the token with Keycloak at this endpoint
# and adds the X-User-ID and X-User-Role headers to the response.
upstream auth_service {
    server user-service:8081;
}

# ============================================================
# MAIN SERVER BLOCK
# ============================================================
server {
    listen 80;
    server_name localhost;

    # Global proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    # ---- Health Check (no auth required) -------------------
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ---- Keycloak internal validation endpoint -----------------
    # This location is not exposed publicly; it is only for auth_request
    location = /internal/auth/validate {
        internal;
        proxy_pass              http://auth_service/internal/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
        proxy_set_header        Authorization $http_authorization;
    }

    # ============================================================
    # PUBLIC ENDPOINTS — No auth required
    # ============================================================

    # Keycloak auth endpoints — forwarded directly to Keycloak
    location /realms/ {
        proxy_pass http://keycloak:8180;
        proxy_set_header Host $host:8180;
    }

    # Product listing and detail — public
    location ~ ^/api/v1/products(/[^/]+)?$ {
        if ($request_method = GET) {
            proxy_pass http://product_service;
            break;
        }
        # Methods other than GET require authentication
        auth_request /internal/auth/validate;
        auth_request_set $user_id   $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;
        proxy_set_header X-User-ID   $user_id;
        proxy_set_header X-User-Role $user_role;
        proxy_pass http://product_service;
    }

    # Category listing — public
    location /api/v1/categories {
        if ($request_method = GET) {
            proxy_pass http://product_service;
            break;
        }
        auth_request /internal/auth/validate;
        auth_request_set $user_id   $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;
        proxy_set_header X-User-ID   $user_id;
        proxy_set_header X-User-Role $user_role;
        proxy_pass http://product_service;
    }

    # # Search — public
    # location /api/v1/search/ {
    #     proxy_pass http://search_service;
    # }

    # ============================================================
    # PROTECTED ENDPOINTS — Require Keycloak JWT
    # ============================================================

    # User service endpoints
    location /api/v1/users/ {
        auth_request /internal/auth/validate;
        auth_request_set $user_id   $upstream_http_x_user_id;
        auth_request_set $user_role $upstream_http_x_user_role;
        proxy_set_header X-User-ID   $user_id;
        proxy_set_header X-User-Role $user_role;
        proxy_pass http://user_service;
    }

    # # Order endpoints
    # location /api/v1/orders/ {
    #     auth_request /internal/auth/validate;
    #     auth_request_set $user_id   $upstream_http_x_user_id;
    #     auth_request_set $user_role $upstream_http_x_user_role;
    #     proxy_set_header X-User-ID   $user_id;
    #     proxy_set_header X-User-Role $user_role;
    #     proxy_pass http://order_service;
    # }

    # # Payment endpoints
    # location /api/v1/payments/ {
    #     auth_request /internal/auth/validate;
    #     auth_request_set $user_id   $upstream_http_x_user_id;
    #     auth_request_set $user_role $upstream_http_x_user_role;
    #     proxy_set_header X-User-ID   $user_id;
