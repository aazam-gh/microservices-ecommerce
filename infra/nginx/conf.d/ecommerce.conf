# ============================================================
# E-Commerce Platform — Nginx Routing Config
# File path: nginx/conf.d/ecommerce.conf
# ============================================================

# ---- Upstream Definitions ----------------------------------
# Update the host:port entries below once the services are ready.
# During development the services can be accessed via host.docker.internal.

upstream user_service {
    server user-service:8081;
}

upstream product_service {
    server product-service:8082;
}

