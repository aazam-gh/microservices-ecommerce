    # ============================================================
    # ADMIN ENDPOINTS — Require admin JWT
    # (user-service performs role checks)
    # ============================================================

    # location /api/v1/admin/ {
    #     auth_request /internal/auth/validate;
    #     auth_request_set $user_id   $upstream_http_x_user_id;
    #     auth_request_set $user_role $upstream_http_x_user_role;
    #     proxy_set_header X-User-ID   $user_id;
    #     proxy_set_header X-User-Role $user_role;

    #     # Determine which service to route to based on the path
    #     location /api/v1/admin/products/ {
    #         proxy_pass http://product_service;
    #     }
    #     location /api/v1/admin/orders/ {
    #         proxy_pass http://order_service;
    #     }
    #     location /api/v1/admin/payments/ {
    #         proxy_pass http://payment_service;
    #     }
    # }

    # ============================================================
    # ERROR HANDLING
    # ============================================================
    error_page 401 = @unauthorized;
    error_page 403 = @forbidden;
    error_page 502 503 504 = @service_unavailable;

    location @unauthorized {
        return 401 '{"error":"unauthorized","message":"A valid token is required"}';
        add_header Content-Type application/json;
    }

    location @forbidden {
        return 403 '{"error":"forbidden","message":"You are not authorized for this action"}';
        add_header Content-Type application/json;
    }

    location @service_unavailable {
        return 503 '{"error":"service_unavailable","message":"The service is currently unavailable"}';
        add_header Content-Type application/json;
    }
}
